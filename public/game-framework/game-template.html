<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My Game · Games Inc Jr</title>
  <link rel="stylesheet" href="/game-framework/overlay-styles.css" />
</head>
<body>
<div id="gij-wrap">

  <!-- ── Try-Now Overlay ── -->
  <div id="gij-try-overlay" class="gij-overlay">
    <div class="gij-modal">
      <h1 data-game-title>My Game</h1>
      <p id="gij-description">One-sentence hook about the game.</p>
      <button id="gij-try-btn" class="gij-btn gij-btn-primary">▶ Play Now</button>
    </div>
  </div>

  <!-- ── Instructions Overlay ── -->
  <div id="gij-instructions-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>How to Play</h2>
      <ul id="gij-instructions" class="gij-list"></ul>
      <button id="gij-start-btn" class="gij-btn gij-btn-primary">Let's Go!</button>
    </div>
  </div>

  <!-- ── Game-Over Overlay ── -->
  <div id="gij-gameover-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>Game Over</h2>
      <div class="gij-score-row">
        <span id="gij-final-score">Score: 0</span>
        <span id="gij-final-hs">Best: 0</span>
      </div>
      <button id="gij-restart-btn" class="gij-btn gij-btn-primary">Play Again</button>
    </div>
  </div>

  <!-- ── Stage ── -->
  <div id="gij-stage">

    <!-- HUD (shown after game starts) -->
    <div id="gij-hud" class="hidden">
      <div class="gij-badge">⭐ <strong id="gij-score">0</strong></div>
      <div class="gij-badge">🏆 <strong id="gij-highscore">0</strong></div>
      <!-- Add extra game-specific badges here, e.g.: -->
      <!-- <div class="gij-badge">❤️ <strong id="lives">3</strong></div> -->
    </div>

    <canvas id="gij-canvas"></canvas>

    <!-- Auto-built mobile controls -->
    <div id="gij-controls"></div>

  </div><!-- /gij-stage -->
</div><!-- /gij-wrap -->

<script src="/game-framework/game-engine.js"></script>
<script src="/game-framework/game-utils.js"></script>
<script>
// ════════════════════════════════════════════════════════════
//  STEP 1 — Configure your game
// ════════════════════════════════════════════════════════════
const GAME = {
  slug:        'my-game',          // Must match games.json slug
  title:       'My Game',
  description: 'Short description.',
  instructions: [
    '<strong>Arrow Keys / WASD:</strong> Move',
    '<strong>Space:</strong> Action',
    '<strong>Goal:</strong> Describe the win condition',
  ],
  controls: [
    { label: '◀', action: 'left'  },
    { label: '▶', action: 'right' },
    { label: '▲', action: 'up'   },
    { label: '⚡', action: 'space', cls: 'gij-ctrl-space' },
  ],
  width:  800,   // logical canvas width
  height: 600,   // logical canvas height
};

// ════════════════════════════════════════════════════════════
//  STEP 2 — Initialise framework objects
// ════════════════════════════════════════════════════════════
const canvas    = document.getElementById('gij-canvas');
const game      = new GameEngine(canvas).setup(GAME);
const input     = new InputManager();
const particles = new ParticleSystem();

// ════════════════════════════════════════════════════════════
//  STEP 3 — Define game state
// ════════════════════════════════════════════════════════════
const player = {
  x: GAME.width / 2 - 16, y: GAME.height - 80,
  w: 32, h: 32,
  vx: 0, vy: 0,
  speed: 260,    // pixels per second — NOT pixels per frame
};

function resetGame() {
  player.x = GAME.width / 2 - 16;
  player.y = GAME.height - 80;
  player.vx = player.vy = 0;
  particles.clear();
  // reset your other game state here
}

game.onRestart(resetGame);

// ════════════════════════════════════════════════════════════
//  STEP 4 — Update  (fixed 60 Hz, dt = 1/60 sec)
// ════════════════════════════════════════════════════════════
game.onUpdate((dt) => {
  if (game.state !== 'playing') return;

  // Input
  player.vx = 0;
  if (input.isPressed('left'))  player.vx = -player.speed;
  if (input.isPressed('right')) player.vx =  player.speed;

  // Physics — always multiply by dt
  GameUtils.applyVelocity(player, dt);
  GameUtils.clampToCanvas(player, game.W, game.H);

  particles.update(dt);

  // Scoring / game over
  // game.addScore(10);
  // game.shake(6, 0.2);
  // game.endGame();
});

// ════════════════════════════════════════════════════════════
//  STEP 5 — Render  (every animation frame)
// ════════════════════════════════════════════════════════════
game.onRender((ctx) => {
  // Background
  ctx.fillStyle = '#010818';
  ctx.fillRect(0, 0, game.W, game.H);

  // Player
  ctx.fillStyle = '#00e5ff';
  ctx.fillRect(player.x, player.y, player.w, player.h);

  particles.draw(ctx);
});
</script>
</body>
</html>
