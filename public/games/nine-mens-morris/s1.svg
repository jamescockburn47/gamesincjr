<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-screenshot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3561;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bg-screenshot)"/>
  
  <!-- Game board -->
  <g transform="translate(400, 225)">
    <!-- Outer square -->
    <rect x="-140" y="-140" width="280" height="280" fill="none" stroke="#e8e8e8" stroke-width="4"/>
    <!-- Middle square -->
    <rect x="-95" y="-95" width="190" height="190" fill="none" stroke="#e8e8e8" stroke-width="4"/>
    <!-- Inner square -->
    <rect x="-50" y="-50" width="100" height="100" fill="none" stroke="#e8e8e8" stroke-width="4"/>
    
    <!-- Connecting lines -->
    <line x1="0" y1="-140" x2="0" y2="-50" stroke="#e8e8e8" stroke-width="3"/>
    <line x1="0" y1="50" x2="0" y2="140" stroke="#e8e8e8" stroke-width="3"/>
    <line x1="-140" y1="0" x2="-50" y2="0" stroke="#e8e8e8" stroke-width="3"/>
    <line x1="50" y1="0" x2="140" y2="0" stroke="#e8e8e8" stroke-width="3"/>
    
    <!-- Position markers -->
    <circle cx="-140" cy="-140" r="6" fill="#444" opacity="0.5"/>
    <circle cx="0" cy="-140" r="6" fill="#444" opacity="0.5"/>
    <circle cx="140" cy="-140" r="6" fill="#444" opacity="0.5"/>
    <circle cx="-140" cy="0" r="6" fill="#444" opacity="0.5"/>
    <circle cx="140" cy="0" r="6" fill="#444" opacity="0.5"/>
    <circle cx="-140" cy="140" r="6" fill="#444" opacity="0.5"/>
    <circle cx="0" cy="140" r="6" fill="#444" opacity="0.5"/>
    <circle cx="140" cy="140" r="6" fill="#444" opacity="0.5"/>
  </g>
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">Game Board Layout</text>
</svg>
