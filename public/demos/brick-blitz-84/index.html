<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Brick Blitz '84 · Games Inc Jr</title>
  <link rel="stylesheet" href="/game-framework/overlay-styles.css" />
  <style>
    /* Game-specific extras — colour theme only */
    :root { --accent: #33aaff; --ball: #ff2d95; --wall: #1c2b57; }
    #gij-stage { background: #0e1426; }
    canvas { background: #0e1426; }
    #gij-hud .gij-badge strong { color: var(--accent); }
  </style>
</head>
<body>
<div id="gij-wrap">

  <div id="gij-try-overlay" class="gij-overlay">
    <div class="gij-modal">
      <h1 data-game-title>Brick Blitz '84</h1>
      <p id="gij-description">Break all the bricks — don't let the ball drop!</p>
      <button id="gij-try-btn" class="gij-btn gij-btn-primary">▶ Play Now</button>
    </div>
  </div>

  <div id="gij-instructions-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>How to Play</h2>
      <ul id="gij-instructions" class="gij-list"></ul>
      <button id="gij-start-btn" class="gij-btn gij-btn-primary">Let's Go!</button>
    </div>
  </div>

  <div id="gij-gameover-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>Game Over</h2>
      <div class="gij-score-row">
        <span id="gij-final-score">Score: 0</span>
        <span id="gij-final-hs">Best: 0</span>
      </div>
      <button id="gij-restart-btn" class="gij-btn gij-btn-primary">Play Again</button>
    </div>
  </div>

  <div id="gij-stage">
    <div id="gij-hud" class="hidden">
      <div class="gij-badge">⭐ <strong id="gij-score">0</strong></div>
      <div class="gij-badge">🏆 <strong id="gij-highscore">0</strong></div>
      <div class="gij-badge">❤️ <strong id="lives-disp">3</strong></div>
      <div class="gij-badge">Lv <strong id="level-disp">1</strong></div>
    </div>
    <canvas id="gij-canvas"></canvas>
    <div id="gij-controls"></div>
  </div>

</div>

<script src="/game-framework/game-engine.js"></script>
<script src="/game-framework/game-utils.js"></script>
<script>
const GAME = {
  slug:  'brick-blitz-84',
  title: "Brick Blitz '84",
  description: 'Break all the bricks — keep the ball alive!',
  instructions: [
    '<strong>← → / A D:</strong> Move paddle',
    '<strong>Space:</strong> Launch ball',
    '<strong>Goal:</strong> Clear all bricks without losing 3 balls',
  ],
  controls: [
    { label: '◀', action: 'left'  },
    { label: 'Launch', action: 'space', cls: 'gij-ctrl-space' },
    { label: '▶', action: 'right' },
  ],
  width: 800, height: 600,
};

const canvas = document.getElementById('gij-canvas');
const game   = new GameEngine(canvas).setup(GAME);
const input  = new InputManager();
const fx     = new ParticleSystem();

const W = game.W, H = game.H;

// ── Game state ─────────────────────────────────────────────
let lives, level, bricks, ballLaunched;

const paddle = { x: 0, y: H - 28, w: 100, h: 14, speed: 420 };
const ball   = { x: 0, y: 0, r: 7, vx: 0, vy: 0 };

// Speed stored in pixels/second (converted from old px/frame * 60)
const BALL_SPEED_BASE = 340;  // px/s ≈ 5.67 px/frame @60Hz

function hslColor(h) { return `hsl(${h} 80% 60%)`; }

function spawnLevel() {
  bricks = [];
  const rows  = 3 + Math.min(5, level);
  const cols  = 10;
  const mx    = 40, top = 60;
  const bw    = (W - 2 * mx) / cols - 6;
  const bh    = 22;
  const hues  = [200, 220, 260, 280, 180];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const hp = 1 + Math.floor(r / 2);
      bricks.push({
        x: mx + c * (bw + 6), y: top + r * (bh + 6),
        w: bw, h: bh, hp, maxHp: hp,
        color: hslColor(hues[(r + c) % hues.length]),
      });
    }
  }
  resetBall();
}

function resetBall() {
  paddle.x     = W / 2 - paddle.w / 2;
  ball.x       = W / 2;
  ball.y       = paddle.y - 16;
  const dir    = (Math.random() < 0.5 ? -1 : 1);
  ball.vx      = dir * BALL_SPEED_BASE * 0.6;
  ball.vy      = -BALL_SPEED_BASE;
  ballLaunched = false;
}

function reset() {
  lives  = 3;
  level  = 1;
  document.getElementById('lives-disp').textContent = lives;
  document.getElementById('level-disp').textContent = level;
  spawnLevel();
  fx.clear();
}

game.onRestart(reset);

// ── Update ─────────────────────────────────────────────────
game.onUpdate((dt) => {
  if (game.state !== 'playing') return;

  // Paddle movement
  if (input.isPressed('left'))  paddle.x = Math.max(8, paddle.x - paddle.speed * dt);
  if (input.isPressed('right')) paddle.x = Math.min(W - paddle.w - 8, paddle.x + paddle.speed * dt);

  // Launch
  if (!ballLaunched && input.isPressed('space')) ballLaunched = true;

  if (!ballLaunched) {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 2;
    return;
  }

  // Move ball (delta-time based)
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // Wall bounces
  if (ball.x - ball.r < 0)  { ball.x = ball.r;      ball.vx =  Math.abs(ball.vx); }
  if (ball.x + ball.r > W)  { ball.x = W - ball.r;  ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r < 20) { ball.y = 20 + ball.r; ball.vy =  Math.abs(ball.vy); }

  // Paddle collision
  if (ball.y + ball.r >= paddle.y &&
      ball.y - ball.r <= paddle.y + paddle.h &&
      ball.x >= paddle.x - ball.r &&
      ball.x <= paddle.x + paddle.w + ball.r) {
    const hit   = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    ball.vx = hit * speed * 0.9;
    ball.vy = -Math.abs(ball.vy);
    ball.y  = paddle.y - ball.r - 1;
    fx.burst(ball.x, ball.y, 6, { colors: ['#33aaff','#ffffff'], minSpeed: 40, maxSpeed: 120, gravity: 80 });
  }

  // Ball lost
  if (ball.y > H + 20) {
    lives--;
    document.getElementById('lives-disp').textContent = lives;
    fx.burst(ball.x, H - 60, 14, { colors: ['#ff2d95','#ff8800'], gravity: 120 });
    game.shake(6, 0.25);
    if (lives <= 0) {
      game.endGame();
    } else {
      resetBall();
    }
    return;
  }

  // Brick collisions
  for (let i = bricks.length - 1; i >= 0; i--) {
    const b = bricks[i];
    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
        ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
      // Determine bounce direction by overlap
      const overlapL = ball.x + ball.r - b.x;
      const overlapR = b.x + b.w - (ball.x - ball.r);
      const overlapT = ball.y + ball.r - b.y;
      const overlapB = b.y + b.h - (ball.y - ball.r);
      const minH = Math.min(overlapL, overlapR);
      const minV = Math.min(overlapT, overlapB);
      if (minH < minV) ball.vx *= -1; else ball.vy *= -1;

      b.hp--;
      if (b.hp <= 0) {
        fx.burst(b.x + b.w/2, b.y + b.h/2, 10, {
          colors: [b.color, '#ffffff'],
          minSpeed: 60, maxSpeed: 200, gravity: 150,
        });
        bricks.splice(i, 1);
        game.addScore(10 * level);
      } else {
        game.addScore(2);
      }
      // Speed up ball slightly each hit (capped)
      const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      if (speed < BALL_SPEED_BASE * 1.8) {
        const f = 1.015;
        ball.vx *= f; ball.vy *= f;
      }
      break;
    }
  }

  if (bricks.length === 0) {
    level++;
    document.getElementById('level-disp').textContent = level;
    spawnLevel();
    game.addScore(100 * level);
    ballLaunched = true;
  }

  fx.update(dt);
});

// ── Render ──────────────────────────────────────────────────
game.onRender((ctx) => {
  // Background
  ctx.fillStyle = '#0e1426';
  ctx.fillRect(0, 0, W, H);

  // Top wall
  ctx.fillStyle = '#1c2b57';
  ctx.fillRect(0, 0, W, 20);

  // Paddle (gradient)
  const pg = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  pg.addColorStop(0, '#5bc4ff');
  pg.addColorStop(1, '#1a6bcc');
  ctx.fillStyle = pg;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
  ctx.fill();

  // Ball (glow)
  ctx.shadowColor = '#ff2d95';
  ctx.shadowBlur  = 12;
  ctx.fillStyle   = '#ff2d95';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Bricks
  for (const b of bricks) {
    const alpha = 0.5 + 0.5 * (b.hp / b.maxHp);
    ctx.fillStyle   = b.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.globalAlpha = 1;
    // Highlight
    ctx.fillStyle = `rgba(255,255,255,0.15)`;
    ctx.fillRect(b.x, b.y, b.w, 4);
  }

  fx.draw(ctx);

  // "Press Space to launch" hint
  if (!ballLaunched && game.state === 'playing') {
    ctx.fillStyle   = 'rgba(255,255,255,0.7)';
    ctx.font        = '16px Arial';
    ctx.textAlign   = 'center';
    ctx.fillText('Press Space / tap to launch', W / 2, H - 10);
  }
});

reset();
</script>
</body>
</html>
