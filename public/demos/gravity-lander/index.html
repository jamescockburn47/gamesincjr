<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gravity Lander · Games Inc Jr</title>
  <link rel="stylesheet" href="/game-framework/overlay-styles.css" />
  <style>
    #gij-stage { background: linear-gradient(#071021, #0b1530); }
    canvas { background: linear-gradient(#071021, #0b1530); }
  </style>
</head>
<body>
<div id="gij-wrap">

  <div id="gij-try-overlay" class="gij-overlay">
    <div class="gij-modal">
      <h1 data-game-title>Gravity Lander</h1>
      <p id="gij-description">Guide your lander to a safe touchdown — don't crash!</p>
      <button id="gij-try-btn" class="gij-btn gij-btn-primary">▶ Play Now</button>
    </div>
  </div>

  <div id="gij-instructions-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>How to Play</h2>
      <ul id="gij-instructions" class="gij-list"></ul>
      <button id="gij-start-btn" class="gij-btn gij-btn-primary">Launch!</button>
    </div>
  </div>

  <div id="gij-gameover-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>Crashed!</h2>
      <div class="gij-score-row">
        <span id="gij-final-score">Score: 0</span>
        <span id="gij-final-hs">Best: 0</span>
      </div>
      <button id="gij-restart-btn" class="gij-btn gij-btn-primary">Try Again</button>
    </div>
  </div>

  <div id="gij-stage">
    <div id="gij-hud" class="hidden">
      <div class="gij-badge">⭐ <strong id="gij-score">0</strong></div>
      <div class="gij-badge">🏆 <strong id="gij-highscore">0</strong></div>
      <div class="gij-badge">⛽ <strong id="fuel-disp">100</strong></div>
      <div class="gij-badge" id="vspeed-badge">↕ <strong id="vs-disp">0.0</strong></div>
    </div>
    <canvas id="gij-canvas"></canvas>
    <div id="gij-controls"></div>
  </div>

</div>

<script src="/game-framework/game-engine.js"></script>
<script src="/game-framework/game-utils.js"></script>
<script>
const GAME = {
  slug:  'gravity-lander',
  title: 'Gravity Lander',
  description: 'Guide your lander to a safe touchdown on the green platform.',
  instructions: [
    '<strong>← → / A D:</strong> Rotate the lander',
    '<strong>↑ / W:</strong> Fire thrusters',
    '<strong>Goal:</strong> Land softly on the green pad — keep V-Speed in the <span style="color:#2ee6a6">green</span>',
    '<strong>Tip:</strong> Less than 4.5 V-Speed = safe landing!',
  ],
  controls: [
    { label: '◀', action: 'left'  },
    { label: '🔥', action: 'up', cls: 'gij-ctrl-space'   },
    { label: '▶', action: 'right' },
  ],
  width: 800, height: 600,
};

const canvas = document.getElementById('gij-canvas');
const game   = new GameEngine(canvas).setup(GAME);
const input  = new InputManager();
const fx     = new ParticleSystem();

const W = game.W, H = game.H;

// ── Game constants ─────────────────────────────────────────
const GRAVITY          = 18;   // px/s² (gentle)
const THRUST_POWER     = 120;  // px/s² thrust acceleration
const ROT_SPEED        = 2.8;  // rad/s
const TERMINAL_VEL     = 200;  // px/s max fall speed
const STALL_DURATION   = 4.0;  // s before gravity activates
const FUEL_MAX         = 200;
const FUEL_DRAIN       = 8;    // units/s
const SAFE_VY          = 60;   // px/s max safe landing v-speed
const SAFE_VX          = 40;
const SAFE_ANGLE       = 0.4;  // rad

// ── State ──────────────────────────────────────────────────
let lander, pad, landingMsg, msgTimer;

function reset() {
  lander = {
    x: 200 + Math.random() * 400, y: 80,
    vx: (Math.random() - 0.5) * 40,
    vy: 0,
    angle: 0,
    fuel: FUEL_MAX,
    alive: true,
    spawnTime: 0,
  };
  pad = { x: 80 + Math.random() * 540, y: 520, w: 100 + Math.random() * 80 };
  landingMsg = '';
  msgTimer   = 0;
  fx.clear();
}

game.onRestart(reset);

// ── Update ─────────────────────────────────────────────────
game.onUpdate((dt) => {
  if (game.state !== 'playing') return;
  if (!lander.alive) return;

  lander.spawnTime += dt;
  const stallOver = lander.spawnTime > STALL_DURATION;

  // Rotation
  if (input.isPressed('left'))  lander.angle -= ROT_SPEED * dt;
  if (input.isPressed('right')) lander.angle += ROT_SPEED * dt;

  // Thrust
  if (input.isPressed('up') && lander.fuel > 0) {
    lander.vx += Math.sin(lander.angle) * THRUST_POWER * dt;
    lander.vy -= Math.cos(lander.angle) * THRUST_POWER * dt;
    lander.fuel = Math.max(0, lander.fuel - FUEL_DRAIN * dt);
    // Thruster particles
    if (Math.random() < 0.6) {
      fx.burst(
        lander.x + Math.sin(lander.angle + Math.PI) * 14,
        lander.y - Math.cos(lander.angle + Math.PI) * 14,
        2, { colors: ['#ff8800','#ffff00'], minSpeed: 40, maxSpeed: 120,
              spread: 0.6, angle: lander.angle + Math.PI, gravity: 30, lifetime: 0.4 }
      );
    }
  }

  // Gravity (after stall)
  if (stallOver) {
    lander.vy += GRAVITY * dt;
    lander.vy  = Math.min(lander.vy, TERMINAL_VEL);
  }

  // Integrate
  lander.x += lander.vx * dt;
  lander.y += lander.vy * dt;

  // Wall bounds
  lander.x = GameUtils.clamp(lander.x, 20, W - 20);

  // HUD
  document.getElementById('fuel-disp').textContent = Math.round(lander.fuel);
  const vs = Math.abs(lander.vy);
  const vsBadge = document.getElementById('vspeed-badge');
  document.getElementById('vs-disp').textContent = lander.vy.toFixed(1);
  if (vs > SAFE_VY)      vsBadge.style.color = '#ff4444';
  else if (vs > SAFE_VY * 0.6) vsBadge.style.color = '#ffaa00';
  else                   vsBadge.style.color = '#2ee6a6';

  // Landing / crash
  if (lander.y + 12 >= pad.y && lander.y < pad.y + 20) {
    const onPad = lander.x > pad.x - 4 && lander.x < pad.x + pad.w + 4;
    const soft  = Math.abs(lander.vy) < SAFE_VY &&
                  Math.abs(lander.vx) < SAFE_VX &&
                  Math.abs(lander.angle) < SAFE_ANGLE;
    lander.alive = false;
    if (onPad && soft) {
      // Successful landing
      const pts = Math.max(0, Math.floor(1000 - Math.abs(lander.vy) * 5 + lander.fuel * 2));
      game.addScore(pts);
      landingMsg = '✅ Safe Landing! +' + pts;
      fx.burst(lander.x, lander.y, 20, { colors: ['#2ee6a6','#ffffff'], gravity: -20, lifetime: 1.2 });
      msgTimer = 2.5;
      setTimeout(() => { reset(); lander.spawnTime = 0; }, 2500);
    } else {
      landingMsg = onPad ? '💥 Too Fast!' : '💥 Missed the Pad!';
      fx.burst(lander.x, lander.y, 30, { colors: ['#ff4400','#ffff00','#ff8800'], gravity: 60 });
      game.shake(10, 0.4);
      msgTimer = 2.0;
      setTimeout(() => game.endGame(), 1800);
    }
  }

  // Fell off bottom
  if (lander.y > H + 60) {
    lander.alive = false;
    game.endGame();
  }

  // Message timer
  if (msgTimer > 0) msgTimer -= dt;

  fx.update(dt);
});

// ── Render ──────────────────────────────────────────────────
game.onRender((ctx) => {
  ctx.fillStyle = '#071021';
  ctx.fillRect(0, 0, W, H);

  // Stars
  if (!game._stars) {
    game._stars = Array.from({ length: 80 }, () => ({
      x: Math.random() * W, y: Math.random() * 500, s: Math.random() * 1.5 + 0.5,
    }));
  }
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  game._stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

  // Ground
  ctx.fillStyle = '#0f1a35';
  ctx.fillRect(0, 540, W, 60);

  // Landing pad
  const padGrad = ctx.createLinearGradient(pad.x, 0, pad.x + pad.w, 0);
  padGrad.addColorStop(0, '#1a6644');
  padGrad.addColorStop(0.5, '#2ee6a6');
  padGrad.addColorStop(1, '#1a6644');
  ctx.fillStyle   = padGrad;
  ctx.shadowColor = '#2ee6a6';
  ctx.shadowBlur  = 12;
  ctx.fillRect(pad.x, pad.y, pad.w, 6);
  ctx.shadowBlur = 0;

  // Lander
  if (lander.alive) {
    ctx.save();
    ctx.translate(lander.x, lander.y);
    ctx.rotate(lander.angle);
    // Body
    ctx.fillStyle   = '#d9e1ff';
    ctx.shadowColor = '#6699ff';
    ctx.shadowBlur  = 8;
    ctx.fillRect(-8, -12, 16, 22);
    // Legs
    ctx.fillStyle = '#2ee6a6';
    ctx.fillRect(-12, 10, 6, 3);
    ctx.fillRect(6, 10, 6, 3);
    // Thrust nozzle
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(-4, 10, 8, 4);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  fx.draw(ctx);

  // Stall countdown
  if (lander.alive && lander.spawnTime < STALL_DURATION) {
    const remaining = Math.ceil(STALL_DURATION - lander.spawnTime);
    ctx.fillStyle   = '#ffaa00';
    ctx.font        = 'bold 28px Arial';
    ctx.textAlign   = 'center';
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur  = 16;
    ctx.fillText('Gravity in: ' + remaining + 's', W / 2, 55);
    ctx.shadowBlur = 0;
  }

  // Landing message
  if (landingMsg && msgTimer > 0) {
    const a = Math.min(1, msgTimer);
    ctx.globalAlpha = a;
    ctx.fillStyle   = '#ffffff';
    ctx.font        = 'bold 36px Arial';
    ctx.textAlign   = 'center';
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur  = 20;
    ctx.fillText(landingMsg, W / 2, H / 2);
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
  }
});

reset();
</script>
</body>
</html>
