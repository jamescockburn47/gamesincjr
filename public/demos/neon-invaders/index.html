<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Neon Invaders · Games Inc Jr</title>
  <link rel="stylesheet" href="/game-framework/overlay-styles.css" />
  <style>
    :root { --neon: #39ff14; --laser: #ff2d95; --ship: #33aaff; }
    #gij-stage { background: #0a0f1c; }
    canvas { background: radial-gradient(1200px 600px at 50% -200px, #1a2c57 0%, #0a0f1c 60%); }
  </style>
</head>
<body>
<div id="gij-wrap">

  <div id="gij-try-overlay" class="gij-overlay">
    <div class="gij-modal">
      <h1 data-game-title>Neon Invaders</h1>
      <p id="gij-description">Blast through waves of neon invaders in this retro arcade shooter!</p>
      <button id="gij-try-btn" class="gij-btn gij-btn-primary">▶ Play Now</button>
    </div>
  </div>

  <div id="gij-instructions-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>How to Play</h2>
      <ul id="gij-instructions" class="gij-list"></ul>
      <button id="gij-start-btn" class="gij-btn gij-btn-primary">Open Fire!</button>
    </div>
  </div>

  <div id="gij-gameover-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>Base Destroyed!</h2>
      <div class="gij-score-row">
        <span id="gij-final-score">Score: 0</span>
        <span id="gij-final-hs">Best: 0</span>
      </div>
      <button id="gij-restart-btn" class="gij-btn gij-btn-primary">Deploy Again</button>
    </div>
  </div>

  <div id="gij-stage">
    <div id="gij-hud" class="hidden">
      <div class="gij-badge">⭐ <strong id="gij-score">0</strong></div>
      <div class="gij-badge">🏆 <strong id="gij-highscore">0</strong></div>
      <div class="gij-badge">❤️ <strong id="lives-disp">3</strong></div>
      <div class="gij-badge">🌊 <strong id="wave-disp">1</strong></div>
    </div>
    <canvas id="gij-canvas"></canvas>
    <div id="gij-controls"></div>
  </div>

</div>

<script src="/game-framework/game-engine.js"></script>
<script src="/game-framework/game-utils.js"></script>
<script>
const GAME = {
  slug:  'neon-invaders',
  title: 'Neon Invaders',
  description: 'Blast through waves of neon invaders in this retro arcade shooter!',
  instructions: [
    '<strong>← → / A D:</strong> Move your ship',
    '<strong>Space / Fire:</strong> Shoot',
    '<strong>Goal:</strong> Clear all invaders before they reach the bottom!',
    '<strong>Tip:</strong> They speed up each wave — don\'t let them get past you!',
  ],
  controls: [
    { label: '◀', action: 'left'  },
    { label: '🔥', action: 'fire', cls: 'gij-ctrl-fire' },
    { label: '▶', action: 'right' },
  ],
  width: 800, height: 600,
};

const canvas = document.getElementById('gij-canvas');
const game   = new GameEngine(canvas).setup(GAME);
const input  = new InputManager();
const fx     = new ParticleSystem();

const W = game.W, H = game.H;

// ── Sprite loading (Kenney Space Shooter Redux, CC0) ──────────
const assets = new AssetLoader();
let spritesReady = false;
const ENEMY_TYPES = ['enemyBlack1', 'enemyBlue2', 'enemyGreen3', 'enemyRed1'];

assets.load({
  playerShip:   '/assets/kenney/space/playerShip2_blue.png',
  enemyBlack1:  '/assets/kenney/space/enemyBlack1.png',
  enemyBlue2:   '/assets/kenney/space/enemyBlue2.png',
  enemyGreen3:  '/assets/kenney/space/enemyGreen3.png',
  enemyRed1:    '/assets/kenney/space/enemyRed1.png',
  laserBlue:    '/assets/kenney/space/laserBlue01.png',
  laserRed:     '/assets/kenney/space/laserRed01.png',
  ufo:          '/assets/kenney/space/ufoRed.png',
}, {
  playerShip: 0.5,   // scale to ~55×42px
  enemyBlack1: 0.5, enemyBlue2: 0.5, enemyGreen3: 0.5, enemyRed1: 0.5,
  laserBlue: 1.0, laserRed: 1.0,
  ufo: 0.45,
}).then(() => { spritesReady = true; });

// ── Game state ─────────────────────────────────────────────
let lives, wave, fleet, lasers;
let fleetDir, fleetStepTimer, fleetStepInterval;
let shootCooldown;

// Player dimensions tuned to match sprite size; hitbox = 30% of visual width (shmup standard)
const player = { x: W/2-27, y: H - 60, w: 54, h: 42,
                 speed: GAMEPLAY_PRESETS.shmup.playerSpeed };  // 380 px/s

function spawnWave(w) {
  fleet = [];
  const nCols = 10, nRows = Math.min(5, 3 + Math.floor(w / 2));
  // Use sprite size for spacing when sprites loaded, else fallback
  const sprSize = spritesReady && assets.size('enemyBlack1');
  const ew = sprSize ? sprSize.w : 36;
  const eh = sprSize ? sprSize.h : 28;
  const gapX = ew + 24, gapY = eh + 18;
  const startX = Math.max(20, (W - nCols * gapX) / 2);
  const startY = 60;
  for (let r = 0; r < nRows; r++) {
    // Each row gets a different enemy type for variety
    const sprKey = ENEMY_TYPES[r % ENEMY_TYPES.length];
    for (let c = 0; c < nCols; c++) {
      fleet.push({
        x: startX + c * gapX, y: startY + r * gapY,
        w: ew, h: eh,
        hp: 1 + Math.floor(w / 3),
        hue: 120 - r * 20,  // colour tint for glow effect
        sprKey,
      });
    }
  }
  fleetDir          = 1;
  fleetStepTimer    = 0;
  fleetStepInterval = Math.max(0.08, 0.45 - w * 0.03);
}

function reset() {
  lives         = 3;
  wave          = 1;
  lasers        = [];
  shootCooldown = 0;
  document.getElementById('lives-disp').textContent = lives;
  document.getElementById('wave-disp').textContent  = wave;
  spawnWave(wave);
  fx.clear();
}

game.onRestart(reset);

// ── Update ─────────────────────────────────────────────────
game.onUpdate((dt) => {
  if (game.state !== 'playing') return;

  // Player movement — no "focus" gate needed
  if (input.isPressed('left'))  player.x = Math.max(8, player.x - player.speed * dt);
  if (input.isPressed('right')) player.x = Math.min(W - player.w - 8, player.x + player.speed * dt);

  // Player shoot
  shootCooldown -= dt;
  if (input.isPressed('fire') && shootCooldown <= 0) {
    lasers.push({ x: player.x + player.w/2 - 2, y: player.y - 6, w: 4, h: 12, vy: -580, owner: 'player' });
    shootCooldown = 0.18;
  }

  // Fleet step
  fleetStepTimer += dt;
  if (fleetStepTimer >= fleetStepInterval) {
    fleetStepTimer = 0;
    let hitEdge = false;
    for (const e of fleet) {
      e.x += 14 * fleetDir;
      if (e.x < 16 || e.x + e.w > W - 16) hitEdge = true;
    }
    if (hitEdge) {
      for (const e of fleet) e.y += 18;
      fleetDir *= -1;
    }
    // Random enemy shot
    if (Math.random() < 0.3 && fleet.length) {
      const shooter = fleet[Math.floor(Math.random() * fleet.length)];
      lasers.push({ x: shooter.x + shooter.w/2 - 2, y: shooter.y + shooter.h + 2, w: 4, h: 10, vy: 260 + wave * 15, owner: 'enemy' });
    }
  }

  // Move lasers + collisions
  for (let i = lasers.length - 1; i >= 0; i--) {
    const l = lasers[i];
    l.y += l.vy * dt;
    if (l.y < -20 || l.y > H + 20) { lasers.splice(i, 1); continue; }

    if (l.owner === 'player') {
      let hit = false;
      for (let j = fleet.length - 1; j >= 0; j--) {
        const e = fleet[j];
        if (l.x < e.x + e.w && l.x + l.w > e.x && l.y < e.y + e.h && l.y + l.h > e.y) {
          hit = true;
          e.hp--;
          if (e.hp <= 0) {
            fx.burst(e.x + e.w/2, e.y + e.h/2, 8, {
              colors: [`hsl(${e.hue},100%,60%)`, '#ffffff'],
              gravity: 0, lifetime: 0.5,
            });
            fleet.splice(j, 1);
            game.addScore(10 + wave * 2);
          }
          break;
        }
      }
      if (hit) { lasers.splice(i, 1); continue; }
    } else {
      if (l.x < player.x + player.w && l.x + l.w > player.x &&
          l.y < player.y + player.h && l.y + l.h > player.y) {
        lasers.splice(i, 1);
        lives--;
        document.getElementById('lives-disp').textContent = lives;
        game.shake(8, 0.3);
        fx.burst(player.x + player.w/2, player.y, 12, { colors: ['#33aaff','#ffffff'], gravity: 30 });
        if (lives <= 0) { game.endGame(); return; }
      }
    }
  }

  // Next wave
  if (fleet.length === 0) {
    wave++;
    document.getElementById('wave-disp').textContent = wave;
    game.addScore(50 * wave);
    spawnWave(wave);
    lasers.length = 0;
  }

  // Invaders reach bottom → lose a life
  for (const e of fleet) {
    if (e.y + e.h > H - 30) { lives = 0; game.endGame(); return; }
  }

  fx.update(dt);
});

// ── Render ──────────────────────────────────────────────────
game.onRender((ctx) => {
  // Background
  ctx.fillStyle = '#08091a';
  ctx.fillRect(0, 0, W, H);

  // Radial glow at top
  const topGlow = ctx.createRadialGradient(W/2, -60, 30, W/2, -60, 400);
  topGlow.addColorStop(0, 'rgba(26,44,87,0.7)');
  topGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = topGlow; ctx.fillRect(0, 0, W, H);

  // Scanline grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Player — Kenney sprite or triangle fallback
  const pcx = player.x + player.w / 2, pcy = player.y + player.h / 2;
  if (spritesReady && assets.has('playerShip')) {
    ctx.globalCompositeOperation = 'screen';
    const eg = ctx.createRadialGradient(pcx, pcy + player.h * 0.55, 0, pcx, pcy + player.h * 0.55, 18);
    eg.addColorStop(0, 'rgba(80,200,255,0.9)'); eg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(pcx, pcy + player.h * 0.55, 18, 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    assets.draw(ctx, 'playerShip', pcx, pcy);
  } else {
    ctx.shadowColor = '#33aaff'; ctx.shadowBlur = 14; ctx.fillStyle = '#33aaff';
    ctx.beginPath();
    ctx.moveTo(pcx, pcy - player.h/2);
    ctx.lineTo(pcx + player.w/2, pcy + player.h/2);
    ctx.lineTo(pcx + player.w*0.1, pcy + player.h*0.2);
    ctx.lineTo(pcx - player.w*0.1, pcy + player.h*0.2);
    ctx.lineTo(pcx - player.w/2, pcy + player.h/2);
    ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
  }

  // Fleet — Kenney sprites + neon glow
  for (const e of fleet) {
    const ecx = e.x + e.w / 2, ecy = e.y + e.h / 2;
    ctx.globalCompositeOperation = 'screen';
    const glowR = Math.max(e.w, e.h) * 0.7;
    const eg2 = ctx.createRadialGradient(ecx, ecy, 0, ecx, ecy, glowR);
    eg2.addColorStop(0, `hsla(${e.hue},100%,60%,0.35)`); eg2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = eg2; ctx.beginPath(); ctx.arc(ecx, ecy, glowR, 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    if (spritesReady && assets.has(e.sprKey)) {
      assets.draw(ctx, e.sprKey, ecx, ecy);
    } else {
      ctx.shadowColor = `hsl(${e.hue},100%,60%)`; ctx.shadowBlur = 10;
      ctx.fillStyle   = `hsl(${e.hue},100%,60%)`;
      ctx.fillRect(e.x + 4, e.y + 2, e.w - 8, e.h - 4);
      ctx.fillRect(e.x, e.y + 6, 6, e.h - 10);
      ctx.fillRect(e.x + e.w - 6, e.y + 6, 6, e.h - 10);
      ctx.shadowBlur = 0;
    }
  }

  // Lasers — Kenney sprites or glowing rects
  for (const l of lasers) {
    const lKey = l.owner === 'player' ? 'laserBlue' : 'laserRed';
    const lcx = l.x + l.w / 2, lcy = l.y + l.h / 2;
    if (spritesReady && assets.has(lKey)) {
      ctx.globalCompositeOperation = 'screen';
      assets.draw(ctx, lKey, lcx, lcy);
      ctx.globalCompositeOperation = 'source-over';
    } else {
      ctx.shadowColor = l.owner === 'player' ? '#ff2d95' : '#ffad2d';
      ctx.shadowBlur = 10; ctx.fillStyle = l.owner === 'player' ? '#ff2d95' : '#ffad2d';
      ctx.fillRect(l.x, l.y, l.w, l.h); ctx.shadowBlur = 0;
    }
  }

  fx.draw(ctx);
});

reset();
</script>
</body>
</html>
