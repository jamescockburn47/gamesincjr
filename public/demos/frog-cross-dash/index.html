<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Frog Cross Dash - Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
    
    :root {
      color-scheme: dark;
      --emerald: #34d399;
      --emerald-dark: #065f46;
      --cyan: #22d3ee;
      --amber: #fbbf24;
      --rose: #fb7185;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      font-family: 'Fredoka', sans-serif;
      overflow: hidden;
    }

    .game-container {
      position: relative;
      width: min(95vw, 900px);
      aspect-ratio: 4 / 3;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      box-shadow: 
        0 0 0 4px rgba(52, 211, 153, 0.3),
        0 0 60px rgba(52, 211, 153, 0.2),
        0 30px 80px rgba(0, 0, 0, 0.5);
    }

    .hud {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 32px;
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      z-index: 10;
      pointer-events: none;
    }

    .hud-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 16px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }

    .hud-item span {
      color: var(--amber);
      font-weight: 700;
      min-width: 50px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px;
      text-align: center;
      border-radius: 24px;
      z-index: 20;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05);
    }

    .overlay h2 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--emerald), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }

    .overlay p {
      font-size: 1.2rem;
      color: #cbd5e1;
      max-width: 400px;
      line-height: 1.6;
    }

    .overlay .frog-icon {
      font-size: 5rem;
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .btn {
      padding: 16px 48px;
      font-family: inherit;
      font-size: 1.3rem;
      font-weight: 700;
      color: #0f172a;
      background: linear-gradient(135deg, var(--emerald) 0%, #10b981 100%);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 
        0 8px 32px rgba(52, 211, 153, 0.4),
        inset 0 2px 0 rgba(255,255,255,0.2);
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 40px rgba(52, 211, 153, 0.5);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    .controls-hint {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .key {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      font-size: 1.1rem;
      color: #94a3b8;
    }

    .touch-controls {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      gap: 8px;
      z-index: 100;
    }

    .touch-btn {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      border: 2px solid rgba(52, 211, 153, 0.4);
      background: rgba(15, 23, 42, 0.9);
      color: var(--emerald);
      font-size: 1.5rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.1s ease;
    }

    .touch-btn:active {
      background: var(--emerald);
      color: #0f172a;
      transform: scale(0.95);
    }

    @media (pointer: coarse), (max-width: 768px) {
      .touch-controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
      }
      .touch-controls .up { grid-column: 2; grid-row: 1; }
      .touch-controls .left { grid-column: 1; grid-row: 2; }
      .touch-controls .down { grid-column: 2; grid-row: 2; }
      .touch-controls .right { grid-column: 3; grid-row: 2; }
    }

    .score-popup {
      position: absolute;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--amber);
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      pointer-events: none;
      animation: scoreFloat 1s ease-out forwards;
      z-index: 15;
    }

    @keyframes scoreFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="game" width="900" height="675"></canvas>
    
    <div class="hud">
      <div class="hud-item">🏆 Score: <span id="score">0</span></div>
      <div class="hud-item">⭐ Best: <span id="best">0</span></div>
    </div>

    <div id="startOverlay" class="overlay">
      <div class="frog-icon">🐸</div>
      <h2>Frog Cross Dash</h2>
      <p>Hop across busy roads and rushing rivers! Dodge cars, ride logs, and reach the lily pads to score points!</p>
      <button class="btn" id="startBtn">Start Hopping!</button>
      <div class="controls-hint">
        <div class="key">W</div>
        <div class="key">A</div>
        <div class="key">S</div>
        <div class="key">D</div>
        <span style="color: #64748b; margin-left: 8px;">or Arrow Keys</span>
      </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
      <div class="frog-icon">💀</div>
      <h2>Game Over!</h2>
      <p id="gameOverText">You scored 0 points!</p>
      <button class="btn" id="retryBtn">Try Again</button>
    </div>
  </div>

  <div class="touch-controls">
    <button class="touch-btn up" data-dir="up">▲</button>
    <button class="touch-btn left" data-dir="left">◀</button>
    <button class="touch-btn down" data-dir="down">▼</button>
    <button class="touch-btn right" data-dir="right">▶</button>
  </div>

  <script>
    (() => {
      // ============== CONFIGURATION ==============
      const CONFIG = {
        CELL_SIZE: 50,
        COLS: 18,
        ROWS: 13,
        SAFE_ROWS: 2,           // Safe zone rows at bottom
        GOAL_ROWS: 1,           // Goal zone rows at top
        BASE_SPEED: 25,         // MUCH slower base speed (was 50-150)
        SPEED_VARIATION: 20,    // Speed variation (was 100)
        HOP_DURATION: 0.12,     // Hop animation duration
        PARTICLE_COUNT: 50,     // Ambient particles
        SNAKE_DELAY: 3.5,       // Seconds before snake appears when idle
        SNAKE_SPEED: 2.5,       // Snake movement speed (cells per second)
        LOG_TIP_THRESHOLD: 0.7, // How close to edge before log starts tipping
        LOG_CAPSIZE_TIME: 1.5,  // Seconds on edge before log capsizes
      };

      // ============== CANVAS SETUP ==============
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const container = document.querySelector('.game-container');
      
      // Overlays
      const startOverlay = document.getElementById('startOverlay');
      const gameOverOverlay = document.getElementById('gameOverOverlay');
      const gameOverText = document.getElementById('gameOverText');
      const startBtn = document.getElementById('startBtn');
      const retryBtn = document.getElementById('retryBtn');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');

      // ============== GAME STATE ==============
      const state = {
        running: false,
        paused: false,
        score: 0,
        best: parseInt(localStorage.getItem('frogCrossDash_best') || '0'),
        frog: null,
        lanes: [],
        particles: [],
        ripples: [],
        screenShake: 0,
        snake: null,           // Danger snake that chases idle players
        idleTime: 0,           // How long player has been idle
        lastFrogPos: null,     // Track if frog moved
        time: 0,
        highestRow: 0,
      };

      // ============== PARTICLE SYSTEM ==============
      class Particle {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 3 + 1;
          this.speedX = (Math.random() - 0.5) * 0.5;
          this.speedY = Math.random() * 0.3 + 0.1;
          this.opacity = Math.random() * 0.5 + 0.2;
          this.hue = Math.random() > 0.7 ? 160 : 45; // Green or gold
        }
        update() {
          this.x += this.speedX;
          this.y -= this.speedY;
          if (this.y < 0) this.reset();
          if (this.x < 0) this.x = canvas.width;
          if (this.x > canvas.width) this.x = 0;
        }
        draw() {
          ctx.save();
          ctx.globalAlpha = this.opacity * (0.5 + 0.5 * Math.sin(state.time * 3 + this.x));
          ctx.fillStyle = `hsl(${this.hue}, 80%, 70%)`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      // ============== RIPPLE EFFECT ==============
      class Ripple {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.radius = 5;
          this.maxRadius = 40;
          this.opacity = 0.8;
        }
        update() {
          this.radius += 1.5;
          this.opacity -= 0.02;
        }
        draw() {
          if (this.opacity <= 0) return;
          ctx.save();
          ctx.globalAlpha = this.opacity;
          ctx.strokeStyle = '#67e8f9';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
        isDead() {
          return this.opacity <= 0;
        }
      }

      // ============== FROG ==============
      class Frog {
        constructor(col, row) {
          this.col = col;
          this.row = row;
          this.x = col * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
          this.y = row * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
          this.targetX = this.x;
          this.targetY = this.y;
          this.hopping = false;
          this.hopProgress = 0;
          this.direction = 0; // 0=up, 1=right, 2=down, 3=left
          this.onLog = null;
          this.squish = 1;
          this.landingGrace = 10; // Invincibility frames after landing
          this.logEdgeTime = 0;   // Time spent on edge of log
          this.logTilt = 0;       // Current log tilt angle
        }

        moveTo(col, row) {
          if (this.hopping) return false;
          
          // Bounds check
          if (col < 0 || col >= CONFIG.COLS || row < 0 || row >= CONFIG.ROWS) return false;
          
          // Set direction
          if (row < this.row) this.direction = 0;
          else if (col > this.col) this.direction = 1;
          else if (row > this.row) this.direction = 2;
          else if (col < this.col) this.direction = 3;
          
          this.col = col;
          this.row = row;
          this.targetX = col * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
          this.targetY = row * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
          this.hopping = true;
          this.hopProgress = 0;
          this.onLog = null;
          
          return true;
        }

        update(delta) {
          if (this.hopping) {
            this.hopProgress += delta / CONFIG.HOP_DURATION;
            if (this.hopProgress >= 1) {
              this.hopProgress = 1;
              this.hopping = false;
              this.x = this.targetX;
              this.y = this.targetY;
              this.landingGrace = 8; // Brief invincibility after landing
            } else {
              // Smooth hop with arc
              const t = this.hopProgress;
              const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
              this.x = this.x + (this.targetX - this.x) * ease * 0.3;
              this.y = this.y + (this.targetY - this.y) * ease * 0.3;
            }
            // Squish animation
            this.squish = 1 + 0.2 * Math.sin(this.hopProgress * Math.PI);
          } else {
            // Smoothly move to target
            this.x += (this.targetX - this.x) * 0.2;
            this.y += (this.targetY - this.y) * 0.2;
            this.squish += (1 - this.squish) * 0.1;
          }

          // Move with log if on one
          if (this.onLog) {
            const logSpeed = this.onLog.speed * this.onLog.direction * delta / CONFIG.CELL_SIZE;
            this.col += logSpeed;
            this.targetX = this.col * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
            
            // Check if fell off
            if (this.col < -0.5 || this.col >= CONFIG.COLS + 0.5) {
              return 'drowned';
            }
          }

          return null;
        }

        draw() {
          const hopHeight = this.hopping ? Math.sin(this.hopProgress * Math.PI) * 15 : 0;
          const drawY = this.y - hopHeight;
          
          ctx.save();
          ctx.translate(this.x, drawY);
          
          // Shadow
          ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
          ctx.beginPath();
          ctx.ellipse(0, 20 - hopHeight * 0.3, 18, 8, 0, 0, Math.PI * 2);
          ctx.fill();
          
          // Rotate based on direction
          ctx.rotate([0, Math.PI/2, Math.PI, -Math.PI/2][this.direction]);
          ctx.scale(1, this.squish);
          
          // Body glow
          const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 25);
          gradient.addColorStop(0, '#6ee7b7');
          gradient.addColorStop(0.6, '#34d399');
          gradient.addColorStop(1, '#059669');
          
          // Body
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.ellipse(0, 0, 18, 22, 0, 0, Math.PI * 2);
          ctx.fill();
          
          // Spots
          ctx.fillStyle = '#10b981';
          ctx.beginPath();
          ctx.ellipse(-6, -5, 4, 5, 0, 0, Math.PI * 2);
          ctx.ellipse(6, -5, 4, 5, 0, 0, Math.PI * 2);
          ctx.ellipse(0, 5, 5, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          
          // Eyes
          ctx.fillStyle = '#fef3c7';
          ctx.beginPath();
          ctx.arc(-8, -12, 8, 0, Math.PI * 2);
          ctx.arc(8, -12, 8, 0, Math.PI * 2);
          ctx.fill();
          
          // Eye shine
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(-10, -14, 3, 0, Math.PI * 2);
          ctx.arc(6, -14, 3, 0, Math.PI * 2);
          ctx.fill();
          
          // Pupils
          ctx.fillStyle = '#1e293b';
          ctx.beginPath();
          ctx.arc(-7, -11, 4, 0, Math.PI * 2);
          ctx.arc(9, -11, 4, 0, Math.PI * 2);
          ctx.fill();
          
          // Mouth
          ctx.strokeStyle = '#059669';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 2, 6, 0.2, Math.PI - 0.2);
          ctx.stroke();
          
          ctx.restore();
        }
      }

      // ============== DANGER SNAKE ==============
      class Snake {
        constructor() {
          // Start from bottom of screen
          this.col = Math.floor(CONFIG.COLS / 2);
          this.row = CONFIG.ROWS + 1;
          this.x = this.col * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
          this.y = this.row * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
          this.segments = []; // Trail segments
          this.warningShown = false;
        }

        update(delta, targetCol, targetRow) {
          // Move towards the frog
          const dx = targetCol - this.col;
          const dy = targetRow - this.row;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist > 0.1) {
            // Store old position for trail
            if (this.segments.length < 8) {
              this.segments.unshift({ x: this.x, y: this.y });
            } else {
              this.segments.pop();
              this.segments.unshift({ x: this.x, y: this.y });
            }
            
            const speed = CONFIG.SNAKE_SPEED * delta;
            this.col += (dx / dist) * speed;
            this.row += (dy / dist) * speed;
            this.x = this.col * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
            this.y = this.row * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
          }
          
          // Check if caught the frog
          if (dist < 0.6) {
            return 'caught';
          }
          return null;
        }

        draw() {
          // Draw trail segments
          for (let i = this.segments.length - 1; i >= 0; i--) {
            const seg = this.segments[i];
            const size = 12 - i * 1.2;
            const alpha = 1 - (i / this.segments.length) * 0.5;
            ctx.fillStyle = `rgba(34, 197, 94, ${alpha})`;
            ctx.beginPath();
            ctx.arc(seg.x, seg.y, size, 0, Math.PI * 2);
            ctx.fill();
          }
          
          // Draw snake head
          ctx.save();
          ctx.translate(this.x, this.y);
          
          // Glow effect
          ctx.shadowColor = '#22c55e';
          ctx.shadowBlur = 20;
          
          // Head
          const headGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 18);
          headGrad.addColorStop(0, '#4ade80');
          headGrad.addColorStop(0.7, '#22c55e');
          headGrad.addColorStop(1, '#15803d');
          ctx.fillStyle = headGrad;
          ctx.beginPath();
          ctx.ellipse(0, 0, 18, 14, 0, 0, Math.PI * 2);
          ctx.fill();
          
          // Pattern
          ctx.fillStyle = '#166534';
          ctx.beginPath();
          ctx.ellipse(-5, -2, 4, 6, 0.3, 0, Math.PI * 2);
          ctx.ellipse(5, -2, 4, 6, -0.3, 0, Math.PI * 2);
          ctx.fill();
          
          // Eyes (menacing)
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#fef08a';
          ctx.beginPath();
          ctx.ellipse(-7, -6, 5, 4, 0, 0, Math.PI * 2);
          ctx.ellipse(7, -6, 5, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          
          // Slit pupils
          ctx.fillStyle = '#1a1a1a';
          ctx.beginPath();
          ctx.ellipse(-7, -6, 1.5, 4, 0, 0, Math.PI * 2);
          ctx.ellipse(7, -6, 1.5, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          
          // Tongue
          ctx.strokeStyle = '#ef4444';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, 8);
          ctx.lineTo(0, 16);
          ctx.lineTo(-4, 20);
          ctx.moveTo(0, 16);
          ctx.lineTo(4, 20);
          ctx.stroke();
          
          ctx.restore();
        }
      }

      // ============== LANE GENERATION ==============
      function generateLanes() {
        state.lanes = [];
        
        // Safe zone at bottom (2 rows of grass)
        for (let i = 0; i < CONFIG.SAFE_ROWS; i++) {
          state.lanes.push({ 
            type: 'safe', 
            items: [],
            decorations: generateGrassDecorations()
          });
        }
        
        // Calculate how many obstacle lanes we need
        const obstacleRows = CONFIG.ROWS - CONFIG.SAFE_ROWS - CONFIG.GOAL_ROWS;
        
        // Generate obstacle lanes with guaranteed items
        for (let i = 0; i < obstacleRows; i++) {
          // Alternate between road and river sections
          const isRoad = (Math.floor(i / 2) % 2 === 0);
          const type = isRoad ? 'road' : 'river';
          
          // Alternate direction each lane for variety
          const direction = (i % 2 === 0) ? 1 : -1;
          const speed = CONFIG.BASE_SPEED + Math.random() * CONFIG.SPEED_VARIATION;
          const items = [];
          
          if (type === 'road') {
            // Cars - varied types: motorcycle, car, SUV, truck, bus
            // Different sizes move at different speeds (bigger = slower but deadlier)
            const carTypes = [
              { width: 1.2, color: '#f97316', name: 'motorcycle', speedMod: 1.4 },
              { width: 1.8, color: '#ef4444', name: 'compact', speedMod: 1.2 },
              { width: 2.2, color: '#3b82f6', name: 'sedan', speedMod: 1.0 },
              { width: 2.8, color: '#8b5cf6', name: 'suv', speedMod: 0.85 },
              { width: 3.5, color: '#f59e0b', name: 'truck', speedMod: 0.7 },
              { width: 4.5, color: '#10b981', name: 'bus', speedMod: 0.5 },
            ];
            
            const carCount = 2 + Math.floor(Math.random() * 2);
            const spacing = CONFIG.COLS / carCount;
            for (let j = 0; j < carCount; j++) {
              const carType = carTypes[Math.floor(Math.random() * carTypes.length)];
              items.push({
                col: j * spacing + Math.random() * (spacing * 0.3),
                width: carType.width,
                color: carType.color,
                type: carType.name,
                speedMod: carType.speedMod,
              });
            }
          } else {
            // Logs - varied sizes, smaller logs are tippier
            const logCount = 3 + Math.floor(Math.random() * 2);
            const spacing = CONFIG.COLS / logCount;
            for (let j = 0; j < logCount; j++) {
              const logWidth = 2.5 + Math.random() * 2.5; // 2.5 to 5 cells wide
              items.push({
                col: j * spacing + Math.random() * (spacing * 0.2),
                width: logWidth,
                tippiness: Math.max(0.3, 1 - logWidth / 5), // Smaller logs tip easier
              });
            }
          }
          
          state.lanes.push({ type, items, direction, speed });
        }
        
        // Goal zone with lily pads
        state.lanes.push({ 
          type: 'goal', 
          items: generateLilyPads(),
        });
      }

      function generateGrassDecorations() {
        const decorations = [];
        for (let i = 0; i < 8; i++) {
          decorations.push({
            x: Math.random() * canvas.width,
            type: Math.random() > 0.7 ? 'flower' : 'grass',
            size: 0.5 + Math.random() * 0.5,
            hue: 100 + Math.random() * 40,
          });
        }
        return decorations;
      }

      function generateLilyPads() {
        const pads = [];
        for (let i = 0; i < 5; i++) {
          pads.push({
            col: 1 + i * 3.5,
            occupied: false,
          });
        }
        return pads;
      }

      // ============== DRAWING FUNCTIONS ==============
      function drawBackground() {
        // Sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        skyGrad.addColorStop(0, '#0f172a');
        skyGrad.addColorStop(0.3, '#1e3a5f');
        skyGrad.addColorStop(0.7, '#1e1b4b');
        skyGrad.addColorStop(1, '#312e81');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Stars
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 30; i++) {
          const x = (i * 73 + state.time * 2) % canvas.width;
          const y = (i * 47) % (canvas.height * 0.4);
          const twinkle = 0.3 + 0.7 * Math.sin(state.time * 3 + i);
          ctx.globalAlpha = twinkle * 0.8;
          ctx.beginPath();
          ctx.arc(x, y, 1 + (i % 3) * 0.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawLane(lane, rowIndex) {
        const y = rowIndex * CONFIG.CELL_SIZE;
        const height = CONFIG.CELL_SIZE;
        
        if (lane.type === 'safe') {
          // Grass with texture
          const grassGrad = ctx.createLinearGradient(0, y, 0, y + height);
          grassGrad.addColorStop(0, '#166534');
          grassGrad.addColorStop(0.5, '#15803d');
          grassGrad.addColorStop(1, '#14532d');
          ctx.fillStyle = grassGrad;
          ctx.fillRect(0, y, canvas.width, height);
          
          // Grass blades
          for (let i = 0; i < 30; i++) {
            const gx = (i / 30) * canvas.width + Math.sin(state.time * 2 + i) * 3;
            const sway = Math.sin(state.time * 1.5 + i * 0.5) * 3;
            ctx.strokeStyle = i % 3 === 0 ? '#22c55e' : '#16a34a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(gx, y + height);
            ctx.quadraticCurveTo(gx + sway, y + height - 15, gx + sway * 1.5, y + height - 25);
            ctx.stroke();
          }
          
          // Decorations
          if (lane.decorations) {
            for (const dec of lane.decorations) {
              if (dec.type === 'flower') {
                ctx.fillStyle = ['#f472b6', '#fb923c', '#facc15', '#a78bfa'][Math.floor(dec.x) % 4];
                ctx.beginPath();
                ctx.arc(dec.x, y + height - 10, 5 * dec.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fef08a';
                ctx.beginPath();
                ctx.arc(dec.x, y + height - 10, 2 * dec.size, 0, Math.PI * 2);
                ctx.fill();
              }
            }
          }
          
        } else if (lane.type === 'road') {
          // Asphalt
          const roadGrad = ctx.createLinearGradient(0, y, 0, y + height);
          roadGrad.addColorStop(0, '#1f2937');
          roadGrad.addColorStop(0.5, '#374151');
          roadGrad.addColorStop(1, '#1f2937');
          ctx.fillStyle = roadGrad;
          ctx.fillRect(0, y, canvas.width, height);
          
          // Road lines
          ctx.strokeStyle = '#fbbf24';
          ctx.lineWidth = 3;
          ctx.setLineDash([20, 20]);
          ctx.beginPath();
          ctx.moveTo(0, y + height / 2);
          ctx.lineTo(canvas.width, y + height / 2);
          ctx.stroke();
          ctx.setLineDash([]);
          
          // Edge lines
          ctx.strokeStyle = '#9ca3af';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, y + 2);
          ctx.lineTo(canvas.width, y + 2);
          ctx.moveTo(0, y + height - 2);
          ctx.lineTo(canvas.width, y + height - 2);
          ctx.stroke();
          
        } else if (lane.type === 'river') {
          // Water with animated waves
          const waterGrad = ctx.createLinearGradient(0, y, 0, y + height);
          waterGrad.addColorStop(0, '#0284c7');
          waterGrad.addColorStop(0.5, '#0ea5e9');
          waterGrad.addColorStop(1, '#0369a1');
          ctx.fillStyle = waterGrad;
          ctx.fillRect(0, y, canvas.width, height);
          
          // Animated waves
          ctx.strokeStyle = 'rgba(125, 211, 252, 0.4)';
          ctx.lineWidth = 2;
          for (let w = 0; w < 5; w++) {
            ctx.beginPath();
            for (let x = 0; x < canvas.width; x += 10) {
              const waveY = y + height / 2 + Math.sin((x + state.time * 50 + w * 30) * 0.05) * 5;
              if (x === 0) ctx.moveTo(x, waveY + w * 8);
              else ctx.lineTo(x, waveY + w * 8);
            }
            ctx.stroke();
          }
          
        } else if (lane.type === 'goal') {
          // Goal zone with lily pads
          const goalGrad = ctx.createLinearGradient(0, y, 0, y + height);
          goalGrad.addColorStop(0, '#047857');
          goalGrad.addColorStop(1, '#065f46');
          ctx.fillStyle = goalGrad;
          ctx.fillRect(0, y, canvas.width, height);
          
          // Lily pads
          if (lane.items) {
            for (const pad of lane.items) {
              const px = pad.col * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
              const py = y + height / 2;
              
              // Pad shadow
              ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
              ctx.beginPath();
              ctx.ellipse(px + 3, py + 3, 22, 18, 0, 0, Math.PI * 2);
              ctx.fill();
              
              // Main pad
              const padGrad = ctx.createRadialGradient(px - 5, py - 5, 0, px, py, 25);
              padGrad.addColorStop(0, '#4ade80');
              padGrad.addColorStop(0.7, '#22c55e');
              padGrad.addColorStop(1, '#15803d');
              ctx.fillStyle = padGrad;
              ctx.beginPath();
              ctx.ellipse(px, py, 22, 18, 0, 0, Math.PI * 2);
              ctx.fill();
              
              // Pad cut
              ctx.fillStyle = '#065f46';
              ctx.beginPath();
              ctx.moveTo(px, py);
              ctx.lineTo(px + 22, py - 5);
              ctx.lineTo(px + 22, py + 5);
              ctx.closePath();
              ctx.fill();
              
              // Pad veins
              ctx.strokeStyle = '#16a34a';
              ctx.lineWidth = 1;
              for (let v = 0; v < 5; v++) {
                const angle = (v / 5) * Math.PI * 1.5 - Math.PI * 0.25;
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(px + Math.cos(angle) * 18, py + Math.sin(angle) * 14);
                ctx.stroke();
              }
            }
          }
        }
      }

      function drawCar(car, y) {
        const x = car.col * CONFIG.CELL_SIZE;
        const width = car.width * CONFIG.CELL_SIZE;
        const height = CONFIG.CELL_SIZE - 10;
        const cy = y + 5;
        
        ctx.save();
        
        // Shadow
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.beginPath();
        ctx.roundRect(x + 4, cy + 4, width, height, 8);
        ctx.fill();
        
        // Car body
        const carGrad = ctx.createLinearGradient(x, cy, x, cy + height);
        carGrad.addColorStop(0, car.color);
        carGrad.addColorStop(0.5, car.color);
        carGrad.addColorStop(1, shadeColor(car.color, -30));
        ctx.fillStyle = carGrad;
        ctx.beginPath();
        ctx.roundRect(x, cy, width, height, 8);
        ctx.fill();
        
        // Roof
        ctx.fillStyle = shadeColor(car.color, -20);
        ctx.beginPath();
        ctx.roundRect(x + width * 0.2, cy + 2, width * 0.5, height * 0.4, 6);
        ctx.fill();
        
        // Windows
        ctx.fillStyle = '#93c5fd';
        ctx.beginPath();
        ctx.roundRect(x + width * 0.25, cy + 5, width * 0.4, height * 0.3, 4);
        ctx.fill();
        
        // Window shine
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.beginPath();
        ctx.roundRect(x + width * 0.26, cy + 6, width * 0.15, height * 0.25, 2);
        ctx.fill();
        
        // Headlights
        ctx.fillStyle = '#fef08a';
        ctx.shadowColor = '#fef08a';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.ellipse(x + width - 8, cy + height * 0.3, 4, 3, 0, 0, Math.PI * 2);
        ctx.ellipse(x + width - 8, cy + height * 0.7, 4, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Taillights
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.ellipse(x + 6, cy + height * 0.3, 3, 2, 0, 0, Math.PI * 2);
        ctx.ellipse(x + 6, cy + height * 0.7, 3, 2, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Wheels
        ctx.fillStyle = '#1f2937';
        ctx.beginPath();
        ctx.arc(x + width * 0.2, cy + height, 6, 0, Math.PI * 2);
        ctx.arc(x + width * 0.8, cy + height, 6, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }

      function drawLog(log, y) {
        const x = log.col * CONFIG.CELL_SIZE;
        const width = log.width * CONFIG.CELL_SIZE;
        const height = CONFIG.CELL_SIZE - 14;
        const ly = y + 7;
        
        ctx.save();
        
        // Apply tilt if frog is on this log and on edge
        const frog = state.frog;
        if (frog && frog.currentLog === log && frog.logTilt > 0) {
          const tiltAngle = frog.logTilt * 0.15; // Max 15 degree tilt
          const tiltDir = frog.col < log.col + log.width / 2 ? -1 : 1;
          ctx.translate(x + width / 2, ly + height / 2);
          ctx.rotate(tiltAngle * tiltDir);
          ctx.translate(-(x + width / 2), -(ly + height / 2));
        }
        
        // Water shadow
        ctx.fillStyle = 'rgba(0, 50, 80, 0.4)';
        ctx.beginPath();
        ctx.ellipse(x + width / 2, ly + height + 5, width / 2 - 5, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Log body
        const logGrad = ctx.createLinearGradient(x, ly, x, ly + height);
        logGrad.addColorStop(0, '#a16207');
        logGrad.addColorStop(0.3, '#ca8a04');
        logGrad.addColorStop(0.7, '#a16207');
        logGrad.addColorStop(1, '#713f12');
        ctx.fillStyle = logGrad;
        ctx.beginPath();
        ctx.roundRect(x, ly, width, height, height / 2);
        ctx.fill();
        
        // Log ends
        ctx.fillStyle = '#92400e';
        ctx.beginPath();
        ctx.ellipse(x + 8, ly + height / 2, 8, height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + width - 8, ly + height / 2, 8, height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Rings on ends
        ctx.strokeStyle = '#78350f';
        ctx.lineWidth = 1;
        for (let r = 2; r < 7; r += 2) {
          ctx.beginPath();
          ctx.ellipse(x + 8, ly + height / 2, r, r * 0.8, 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.ellipse(x + width - 8, ly + height / 2, r, r * 0.8, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        
        // Bark texture
        ctx.strokeStyle = '#78350f';
        ctx.lineWidth = 2;
        for (let i = 0; i < 4; i++) {
          const bx = x + 20 + i * (width - 40) / 4;
          ctx.beginPath();
          ctx.moveTo(bx, ly + 5);
          ctx.lineTo(bx + 3, ly + height - 5);
          ctx.stroke();
        }
        
        ctx.restore();
      }

      function shadeColor(color, percent) {
        const num = parseInt(color.replace('#', ''), 16);
        const amt = Math.round(2.55 * percent);
        const R = Math.min(255, Math.max(0, (num >> 16) + amt));
        const G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amt));
        const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
        return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
      }

      // ============== GAME LOGIC ==============
      function handleMove(direction) {
        if (!state.running || state.paused) return;
        
        const frog = state.frog;
        let newCol = frog.col;
        let newRow = frog.row;
        
        switch (direction) {
          case 'up': newRow--; break;
          case 'down': newRow++; break;
          case 'left': newCol--; break;
          case 'right': newCol++; break;
        }
        
        if (frog.moveTo(Math.round(newCol), newRow)) {
          // Check for score
          if (newRow < state.highestRow) {
            const points = (state.highestRow - newRow) * 10;
            state.score += points;
            state.highestRow = newRow;
            showScorePopup(points);
            updateHUD();
          }
          
          // Check if reached goal
          if (newRow === 0) {
            state.score += 100;
            showScorePopup(100);
            // Reset frog to start
            state.frog = new Frog(Math.floor(CONFIG.COLS / 2), CONFIG.ROWS - 2);
            state.highestRow = CONFIG.ROWS - 2;
            updateHUD();
          }
        }
      }

      function showScorePopup(points) {
        const popup = document.createElement('div');
        popup.className = 'score-popup';
        popup.textContent = `+${points}`;
        popup.style.left = `${state.frog.x / canvas.width * 100}%`;
        popup.style.top = `${state.frog.y / canvas.height * 100}%`;
        container.appendChild(popup);
        setTimeout(() => popup.remove(), 1000);
      }

      function checkCollisions() {
        const frog = state.frog;
        
        // Don't check collisions while hopping - gives player reaction time
        if (frog.hopping) return null;
        
        // Grace period after landing (invincibility frames)
        if (frog.landingGrace > 0) {
          frog.landingGrace--;
          return null;
        }
        
        const laneIndex = CONFIG.ROWS - 1 - frog.row;
        if (laneIndex < 0 || laneIndex >= state.lanes.length) return null;
        
        const lane = state.lanes[laneIndex];
        
        if (lane.type === 'road') {
          for (const car of lane.items) {
            // Smarter collision: tight box, no buffer behind the car
            // Car hitbox is slightly smaller than visual for fairness
            const carLeft = car.col + 0.2;  // Shrink hitbox from left edge
            const carRight = car.col + car.width - 0.2;  // Shrink from right edge
            
            // Only count as hit if frog center is inside the car bounds
            if (frog.col >= carLeft && frog.col <= carRight) {
              return 'hit';
            }
          }
        } else if (lane.type === 'river') {
          let onLog = false;
          for (const log of lane.items) {
            // More forgiving log detection - easier to land on logs
            const logLeft = log.col - 0.3;  // Extend grab range slightly
            const logRight = log.col + log.width + 0.1;
            
            if (frog.col >= logLeft && frog.col <= logRight) {
              onLog = true;
              frog.onLog = { speed: lane.speed, direction: lane.direction };
              frog.currentLog = log; // Store log reference for tipping
              // Add ripple effect
              if (Math.random() > 0.95) {
                state.ripples.push(new Ripple(
                  frog.x + (Math.random() - 0.5) * 30,
                  frog.y + 20
                ));
              }
              break;
            }
          }
          if (!onLog) {
            frog.onLog = null;
            frog.currentLog = null;
            return 'drowned';
          }
        } else {
          frog.onLog = null;
          frog.currentLog = null;
        }
        
        return null;
      }

      function updateLanes(delta) {
        for (const lane of state.lanes) {
          if (lane.type === 'road' || lane.type === 'river') {
            for (const item of lane.items) {
              item.col += (lane.direction * lane.speed * delta) / CONFIG.CELL_SIZE;
              
              // Wrap around
              if (lane.direction > 0 && item.col > CONFIG.COLS + item.width) {
                item.col = -item.width - 1;
              } else if (lane.direction < 0 && item.col + item.width < -1) {
                item.col = CONFIG.COLS + 1;
              }
            }
          }
        }
      }

      function update(delta) {
        state.time += delta;
        
        // Update particles
        for (const particle of state.particles) {
          particle.update();
        }
        
        // Update ripples
        for (let i = state.ripples.length - 1; i >= 0; i--) {
          state.ripples[i].update();
          if (state.ripples[i].isDead()) {
            state.ripples.splice(i, 1);
          }
        }
        
        // Update lanes
        updateLanes(delta);
        
        // Update frog
        const frogResult = state.frog.update(delta);
        if (frogResult === 'drowned') {
          gameOver('drowned');
          return;
        }
        
        // ============== IDLE SNAKE LOGIC ==============
        // Track if frog has moved
        const frog = state.frog;
        const currentPos = `${Math.round(frog.col)},${Math.round(frog.row)}`;
        
        if (state.lastFrogPos === currentPos && !frog.hopping) {
          state.idleTime += delta;
          
          // Spawn snake after being idle too long
          if (state.idleTime >= CONFIG.SNAKE_DELAY && !state.snake) {
            state.snake = new Snake();
          }
        } else {
          state.idleTime = 0;
          state.lastFrogPos = currentPos;
          // Snake slowly retreats when player moves
          if (state.snake && state.snake.row > CONFIG.ROWS) {
            state.snake = null;
          }
        }
        
        // Update snake
        if (state.snake) {
          const snakeResult = state.snake.update(delta, frog.col, frog.row);
          if (snakeResult === 'caught') {
            gameOver('snake');
            return;
          }
        }
        
        // ============== LOG TIPPING LOGIC ==============
        if (frog.onLog && frog.currentLog) {
          const log = frog.currentLog;
          const logCenter = log.col + log.width / 2;
          const distFromCenter = Math.abs(frog.col - logCenter);
          const edgeThreshold = (log.width / 2) * CONFIG.LOG_TIP_THRESHOLD;
          
          if (distFromCenter > edgeThreshold) {
            // On the edge - log starts tipping
            const tippiness = log.tippiness || 0.5;
            frog.logEdgeTime += delta * tippiness;
            frog.logTilt = Math.min(1, frog.logEdgeTime / CONFIG.LOG_CAPSIZE_TIME);
            
            // Capsized!
            if (frog.logEdgeTime >= CONFIG.LOG_CAPSIZE_TIME) {
              gameOver('capsized');
              return;
            }
          } else {
            // Safe in the middle - recover
            frog.logEdgeTime = Math.max(0, frog.logEdgeTime - delta * 2);
            frog.logTilt = Math.max(0, frog.logTilt - delta * 2);
          }
        } else {
          frog.logEdgeTime = 0;
          frog.logTilt = 0;
        }
        
        // Check collisions
        const collision = checkCollisions();
        if (collision) {
          gameOver(collision);
        }
        
        // Screen shake decay
        if (state.screenShake > 0) {
          state.screenShake *= 0.9;
        }
      }

      function render() {
        ctx.save();
        
        // Apply screen shake
        if (state.screenShake > 0.5) {
          ctx.translate(
            (Math.random() - 0.5) * state.screenShake,
            (Math.random() - 0.5) * state.screenShake
          );
        }
        
        // Draw background
        drawBackground();
        
        // Draw lanes from top to bottom
        for (let i = CONFIG.ROWS - 1; i >= 0; i--) {
          const laneIndex = CONFIG.ROWS - 1 - i;
          if (laneIndex < state.lanes.length) {
            drawLane(state.lanes[laneIndex], i);
            
            const lane = state.lanes[laneIndex];
            if (lane.type === 'road') {
              for (const car of lane.items) {
                drawCar(car, i * CONFIG.CELL_SIZE);
              }
            } else if (lane.type === 'river') {
              for (const log of lane.items) {
                drawLog(log, i * CONFIG.CELL_SIZE);
              }
            }
          }
        }
        
        // Draw ripples
        for (const ripple of state.ripples) {
          ripple.draw();
        }
        
        // Draw particles
        for (const particle of state.particles) {
          particle.draw();
        }
        
        // Draw frog
        if (state.frog) {
          state.frog.draw();
        }
        
        // Draw snake
        if (state.snake) {
          state.snake.draw();
        }
        
        // Draw snake warning
        if (state.idleTime > CONFIG.SNAKE_DELAY * 0.6 && !state.snake) {
          ctx.save();
          ctx.globalAlpha = 0.5 + 0.5 * Math.sin(state.time * 10);
          ctx.fillStyle = '#ef4444';
          ctx.font = 'bold 20px Fredoka';
          ctx.textAlign = 'center';
          ctx.fillText('🐍 MOVE! Snake approaching...', canvas.width / 2, 40);
          ctx.restore();
        }
        
        // Draw log tipping warning
        if (state.frog && state.frog.logTilt > 0.3) {
          ctx.save();
          ctx.globalAlpha = state.frog.logTilt;
          ctx.fillStyle = '#f59e0b';
          ctx.font = 'bold 18px Fredoka';
          ctx.textAlign = 'center';
          ctx.fillText('⚠️ Log tipping! Move to center!', canvas.width / 2, 60);
          ctx.restore();
        }
        
        ctx.restore();
      }

      function updateHUD() {
        scoreEl.textContent = state.score;
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem('frogCrossDash_best', state.best.toString());
        }
        bestEl.textContent = state.best;
      }

      function gameOver(reason) {
        state.running = false;
        state.screenShake = 20;
        state.snake = null; // Reset snake
        state.idleTime = 0;
        
        const messages = {
          hit: "You got hit by a vehicle! 🚗",
          drowned: "You fell in the water! 🌊",
          snake: "The snake got you! 🐍 Don't stay still!",
          capsized: "The log capsized! 🪵 Stay in the middle!",
        };
        
        gameOverText.textContent = `${messages[reason] || 'Game Over!'} Score: ${state.score}`;
        gameOverOverlay.classList.remove('hidden');
        
        // Save best score
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem('frogCrossDash_best', state.best.toString());
          bestEl.textContent = state.best;
        }
      }

      function requestFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen().catch(() => {});
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
          elem.msRequestFullscreen();
        }
      }

      function startGame() {
        // Go fullscreen
        requestFullscreen();
        
        state.running = true;
        state.score = 0;
        state.highestRow = CONFIG.ROWS - 2;
        state.frog = new Frog(Math.floor(CONFIG.COLS / 2), CONFIG.ROWS - 2);
        state.ripples = [];
        state.snake = null;
        state.idleTime = 0;
        state.lastFrogPos = null;
        generateLanes();
        updateHUD();
        
        startOverlay.classList.add('hidden');
        gameOverOverlay.classList.add('hidden');
        
        // Reset timing to prevent huge delta on first frame
        lastTime = 0;
        loop();
      }

      let lastTime = 0;
      function loop(timestamp = 0) {
        if (!state.running) return;
        
        // On first frame after restart, just set lastTime and skip update
        // This prevents a huge delta that would teleport all items off screen
        if (lastTime === 0 || timestamp - lastTime > 1000) {
          lastTime = timestamp;
          render();
          requestAnimationFrame(loop);
          return;
        }
        
        const delta = Math.min((timestamp - lastTime) / 1000, 0.05);
        lastTime = timestamp;
        
        update(delta);
        render();
        
        requestAnimationFrame(loop);
      }

      // ============== INPUT HANDLING ==============
      const keys = {};
      window.addEventListener('keydown', e => {
        if (keys[e.key]) return;
        keys[e.key] = true;
        
        const key = e.key.toLowerCase();
        if (key === 'arrowup' || key === 'w') handleMove('up');
        else if (key === 'arrowdown' || key === 's') handleMove('down');
        else if (key === 'arrowleft' || key === 'a') handleMove('left');
        else if (key === 'arrowright' || key === 'd') handleMove('right');
        else if (key === 'p') state.paused = !state.paused;
      });
      
      window.addEventListener('keyup', e => {
        keys[e.key] = false;
      });

      // Touch controls
      document.querySelectorAll('.touch-btn').forEach(btn => {
        btn.addEventListener('touchstart', e => {
          e.preventDefault();
          handleMove(btn.dataset.dir);
        });
        btn.addEventListener('click', e => {
          e.preventDefault();
          handleMove(btn.dataset.dir);
        });
      });

      // Button handlers
      startBtn.addEventListener('click', startGame);
      retryBtn.addEventListener('click', startGame);

      // ============== INITIALIZATION ==============
      // Create particles
      for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
        state.particles.push(new Particle());
      }

      // Initial render
      updateHUD();
      drawBackground();
      
      // Draw a preview frog
      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      const previewFrog = new Frog(0, 0);
      previewFrog.x = 0;
      previewFrog.y = 0;
      ctx.restore();
    })();
  </script>
</body>
</html>
