<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Space Runner · Games Inc Jr</title>
  <link rel="stylesheet" href="/game-framework/overlay-styles.css" />
  <style>
    #gij-stage { background: #000; }
    canvas { background: #000; }
  </style>
</head>
<body>
<div id="gij-wrap">

  <div id="gij-try-overlay" class="gij-overlay">
    <div class="gij-modal">
      <h1 data-game-title>Space Runner</h1>
      <p id="gij-description">Dodge asteroids and survive as long as you can!</p>
      <button id="gij-try-btn" class="gij-btn gij-btn-primary">▶ Play Now</button>
    </div>
  </div>

  <div id="gij-instructions-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>How to Play</h2>
      <ul id="gij-instructions" class="gij-list"></ul>
      <button id="gij-start-btn" class="gij-btn gij-btn-primary">Launch!</button>
    </div>
  </div>

  <div id="gij-gameover-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>Destroyed!</h2>
      <div class="gij-score-row">
        <span id="gij-final-score">Score: 0</span>
        <span id="gij-final-hs">Best: 0</span>
      </div>
      <button id="gij-restart-btn" class="gij-btn gij-btn-primary">Try Again</button>
    </div>
  </div>

  <div id="gij-stage" data-aspect="16:9">
    <div id="gij-hud" class="hidden">
      <div class="gij-badge">⭐ <strong id="gij-score">0</strong></div>
      <div class="gij-badge">🏆 <strong id="gij-highscore">0</strong></div>
    </div>
    <canvas id="gij-canvas"></canvas>
    <div id="gij-controls"></div>
  </div>

</div>

<script src="/game-framework/game-engine.js"></script>
<script src="/game-framework/game-utils.js"></script>
<script>
const GAME = {
  slug:  'space-runner',
  title: 'Space Runner',
  description: 'Weave through waves of asteroids. How long can you survive?',
  instructions: [
    '<strong>Arrow Keys / WASD:</strong> Move your ship',
    '<strong>Goal:</strong> Dodge asteroids — score rises every second',
    '<strong>Tip:</strong> Asteroids speed up over time!',
  ],
  controls: [
    { label: '◀', action: 'left'  },
    { label: '▲', action: 'up'   },
    { label: '▼', action: 'down' },
    { label: '▶', action: 'right' },
  ],
  width: 800, height: 450,
};

const canvas = document.getElementById('gij-canvas');
const game   = new GameEngine(canvas).setup(GAME);
const input  = new InputManager();
const fx     = new ParticleSystem();

const W = game.W, H = game.H;

// ── Game state ─────────────────────────────────────────────
let asteroids, stars, spawnTimer, survivalTime, difficulty;

const ship = { x: 0, y: 0, w: 28, h: 28, vx: 0, vy: 0, speed: 280 };

function reset() {
  ship.x = W / 2 - 14;
  ship.y = H - 80;
  ship.vx = ship.vy = 0;
  asteroids    = [];
  spawnTimer   = 0;
  survivalTime = 0;
  difficulty   = 1;
  fx.clear();
  stars = Array.from({ length: 130 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    s: Math.random() * 2 + 0.5,
    spd: Math.random() * 40 + 20,
  }));
}

game.onRestart(reset);

// ── Update ─────────────────────────────────────────────────
game.onUpdate((dt) => {
  if (game.state !== 'playing') return;

  survivalTime += dt;
  difficulty    = 1 + survivalTime * 0.04; // ramps up gently

  // Ship movement — no "focus" needed, controls always active
  ship.vx = 0; ship.vy = 0;
  if (input.isPressed('left'))  ship.vx = -ship.speed;
  if (input.isPressed('right')) ship.vx =  ship.speed;
  if (input.isPressed('up'))    ship.vy = -ship.speed;
  if (input.isPressed('down'))  ship.vy =  ship.speed;

  GameUtils.applyVelocity(ship, dt);
  GameUtils.clampToCanvas(ship, W, H);

  // Starfield scroll
  stars.forEach(st => {
    st.y += st.spd * dt;
    if (st.y > H) { st.y = -2; st.x = Math.random() * W; }
  });

  // Asteroid spawning
  spawnTimer += dt;
  const interval = Math.max(0.3, 1.5 - survivalTime * 0.02);
  if (spawnTimer >= interval) {
    spawnTimer = 0;
    const baseSpeed = 90 + difficulty * 30;
    asteroids.push({
      x: Math.random() * (W - 36),
      y: -40,
      w: 28 + Math.random() * 20,
      h: 28 + Math.random() * 20,
      vy: baseSpeed + Math.random() * 60,
      rot: 0,
      rotSpeed: (Math.random() - 0.5) * 4,
    });
  }

  // Asteroids move
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.y   += a.vy  * dt;
    a.rot += a.rotSpeed * dt;
    if (a.y > H + 50) { asteroids.splice(i, 1); continue; }

    if (GameUtils.hitTest(ship, a, 0.65)) {
      fx.burst(ship.x + ship.w/2, ship.y + ship.h/2, 30, {
        colors: ['#ff8800','#ffff00','#ff2200'],
        minSpeed: 80, maxSpeed: 300, gravity: 60,
      });
      game.shake(10, 0.4);
      game.endGame();
      return;
    }
  }

  // Score every 0.5 seconds of survival
  if (Math.floor(survivalTime * 2) > Math.floor((survivalTime - dt) * 2))
    game.addScore(Math.ceil(difficulty));

  fx.update(dt);
});

// ── Render ──────────────────────────────────────────────────
game.onRender((ctx) => {
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = '#ffffff';
  stars.forEach(st => {
    ctx.globalAlpha = 0.4 + Math.random() * 0.3;
    ctx.fillRect(st.x, st.y, st.s, st.s);
  });
  ctx.globalAlpha = 1;

  // Asteroids
  for (const a of asteroids) {
    ctx.save();
    ctx.translate(a.x + a.w / 2, a.y + a.h / 2);
    ctx.rotate(a.rot);
    ctx.fillStyle   = '#6b6b6b';
    ctx.shadowColor = '#aaaaaa';
    ctx.shadowBlur  = 6;
    // Rough rock shape
    ctx.beginPath();
    const sides = 7, r = a.w / 2;
    for (let s = 0; s < sides; s++) {
      const ang  = (s / sides) * Math.PI * 2;
      const dist = r * (0.75 + Math.sin(s * 2.3) * 0.25);
      s === 0
        ? ctx.moveTo(Math.cos(ang) * dist, Math.sin(ang) * dist)
        : ctx.lineTo(Math.cos(ang) * dist, Math.sin(ang) * dist);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Ship
  const cx = ship.x + ship.w / 2, cy = ship.y + ship.h / 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur  = 16;
  ctx.fillStyle   = '#00e5ff';
  ctx.beginPath();
  ctx.moveTo(0, -ship.h / 2);
  ctx.lineTo(ship.w / 2, ship.h / 2);
  ctx.lineTo(0, ship.h / 3);
  ctx.lineTo(-ship.w / 2, ship.h / 2);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  fx.draw(ctx);
});

reset();
</script>
</body>
</html>
