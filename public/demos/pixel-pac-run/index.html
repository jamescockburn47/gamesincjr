<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pixel Pac Run · Games Inc Jr</title>
  <link rel="stylesheet" href="/game-framework/overlay-styles.css" />
  <style>
    #gij-stage { background: #0f1630; }
    canvas { background: #0f1630; }
  </style>
</head>
<body>
<div id="gij-wrap">

  <div id="gij-try-overlay" class="gij-overlay">
    <div class="gij-modal">
      <h1 data-game-title>Pixel Pac Run</h1>
      <p id="gij-description">Jump over obstacles — survive as long as you can!</p>
      <button id="gij-try-btn" class="gij-btn gij-btn-primary">▶ Play Now</button>
    </div>
  </div>

  <div id="gij-instructions-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>How to Play</h2>
      <ul id="gij-instructions" class="gij-list"></ul>
      <button id="gij-start-btn" class="gij-btn gij-btn-primary">Run!</button>
    </div>
  </div>

  <div id="gij-gameover-overlay" class="gij-overlay hidden">
    <div class="gij-modal">
      <h2>Wipeout!</h2>
      <div class="gij-score-row">
        <span id="gij-final-score">Score: 0</span>
        <span id="gij-final-hs">Best: 0</span>
      </div>
      <button id="gij-restart-btn" class="gij-btn gij-btn-primary">Try Again</button>
    </div>
  </div>

  <div id="gij-stage" data-aspect="16:9">
    <div id="gij-hud" class="hidden">
      <div class="gij-badge">⭐ <strong id="gij-score">0</strong></div>
      <div class="gij-badge">🏆 <strong id="gij-highscore">0</strong></div>
    </div>
    <canvas id="gij-canvas"></canvas>
    <div id="gij-controls"></div>
  </div>

</div>

<script src="/game-framework/game-engine.js"></script>
<script src="/game-framework/game-utils.js"></script>
<script>
const GAME = {
  slug:  'pixel-pac-run',
  title: 'Pixel Pac Run',
  description: 'Jump over obstacles — survive as long as possible!',
  instructions: [
    '<strong>Space / Up Arrow:</strong> Jump',
    '<strong>Goal:</strong> Dodge obstacles and run as far as you can',
    '<strong>Tip:</strong> Speed increases the longer you survive!',
  ],
  controls: [
    { label: '⬆ Jump', action: 'space', cls: 'gij-ctrl-space' },
  ],
  width: 800, height: 450,
};

const canvas = document.getElementById('gij-canvas');
const game   = new GameEngine(canvas).setup(GAME);
const input  = new InputManager();
const fx     = new ParticleSystem();

const W = game.W, H = game.H;
const GROUND = H - 90;

// ── Game state ─────────────────────────────────────────────
let obstacles, spawnTimer, distance, speed, grounded, spaceHeld;
let bgLayers; // parallax

const player = { x: 110, y: GROUND - 34, w: 32, h: 32, vy: 0 };
const GRAVITY  = 900;  // px/s²
const JUMP_VEL = -520; // px/s

function reset() {
  obstacles    = [];
  spawnTimer   = 0;
  distance     = 0;
  speed        = 240;  // px/s, increases over time
  grounded     = true;
  spaceHeld    = false;
  player.y     = GROUND - player.h;
  player.vy    = 0;
  fx.clear();
  bgLayers = [
    { x: 0, speed: 30,  stars: Array.from({length:80}, () => ({ x: Math.random()*W, y: Math.random()*GROUND*0.8, s: Math.random()*2+0.5 })) },
    { x: 0, speed: 60,  stars: Array.from({length:20}, () => ({ x: Math.random()*W, y: GROUND - Math.random()*120, s: 3+Math.random()*4 })) },
  ];
}

game.onRestart(reset);

// ── Update ─────────────────────────────────────────────────
game.onUpdate((dt) => {
  if (game.state !== 'playing') return;

  distance += dt;
  speed     = 240 + distance * 18; // accelerates over time

  // Parallax backgrounds
  bgLayers.forEach(l => {
    l.x -= l.speed * dt;
    if (l.x < -W) l.x += W;
  });

  // Jump
  const jumpNow = input.isPressed('space') || input.isPressed('up');
  if (jumpNow && !spaceHeld && grounded) {
    player.vy = JUMP_VEL;
    grounded  = false;
    fx.burst(player.x + player.w/2, player.y + player.h, 8, {
      colors: ['#33aaff','#ffffff'], gravity: 80, minSpeed: 40, maxSpeed: 120,
      spread: Math.PI * 0.5, angle: Math.PI * 0.5,
    });
  }
  spaceHeld = jumpNow;

  // Gravity
  player.vy += GRAVITY * dt;
  player.y  += player.vy  * dt;
  if (player.y >= GROUND - player.h) {
    player.y  = GROUND - player.h;
    player.vy = 0;
    grounded  = true;
  }

  // Spawn obstacles
  spawnTimer += dt;
  const interval = Math.max(0.7, 2.2 - distance * 0.015);
  if (spawnTimer >= interval) {
    spawnTimer = 0;
    const h = 30 + Math.random() * 50;
    obstacles.push({ x: W + 20, y: GROUND - h, w: 22 + Math.random() * 20, h, vy: 0 });
  }

  // Move + collide
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.x -= speed * dt;
    if (o.x + o.w < 0) { obstacles.splice(i, 1); continue; }
    if (GameUtils.hitTest(player, o, 0.75)) {
      game.shake(8, 0.3);
      fx.burst(player.x + player.w/2, player.y + player.h/2, 20, {
        colors: ['#ff2d95','#ff8800'], gravity: 200,
      });
      game.endGame();
      return;
    }
  }

  // Score
  game.setScore(Math.floor(distance * 10));
  fx.update(dt);
});

// ── Render ──────────────────────────────────────────────────
game.onRender((ctx) => {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
  sky.addColorStop(0, '#0a0e1f');
  sky.addColorStop(1, '#1a2a4a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Stars (parallax)
  bgLayers.forEach(l => {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    l.stars.forEach(s => {
      ctx.fillRect((s.x + l.x) % W, s.y, s.s, s.s);
      if ((s.x + l.x) % W < 0) ctx.fillRect((s.x + l.x) % W + W, s.y, s.s, s.s);
    });
  });

  // Ground
  ctx.fillStyle = '#1c2b57';
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = '#2a3f7a';
  ctx.fillRect(0, GROUND, W, 4);

  // Player (pac-man style)
  ctx.shadowColor = '#33aaff';
  ctx.shadowBlur  = 10;
  ctx.fillStyle   = '#33aaff';
  ctx.beginPath();
  const mouth = grounded ? 0.3 : 0.1;
  ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w/2,
    mouth * Math.PI, (2 - mouth) * Math.PI);
  ctx.lineTo(player.x + player.w/2, player.y + player.h/2);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // Obstacles (spikes/pillars)
  for (const o of obstacles) {
    const g2 = ctx.createLinearGradient(o.x, o.y, o.x, o.y + o.h);
    g2.addColorStop(0, '#ff2d95');
    g2.addColorStop(1, '#880044');
    ctx.fillStyle   = g2;
    ctx.shadowColor = '#ff2d95';
    ctx.shadowBlur  = 8;
    ctx.fillRect(o.x, o.y, o.w, o.h);
    // Spike top
    ctx.fillStyle = '#ff2d95';
    ctx.beginPath();
    ctx.moveTo(o.x, o.y);
    ctx.lineTo(o.x + o.w/2, o.y - 12);
    ctx.lineTo(o.x + o.w, o.y);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  fx.draw(ctx);
});

reset();
</script>
</body>
</html>
